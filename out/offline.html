<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Blue Links</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #003087;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    img { width: 88px; height: 88px; margin-bottom: 1.5rem; }
    h1 { font-size: 1.8rem; font-weight: 700; color: #f0c040; margin-bottom: 0.75rem; }
    p  { color: #b8cef0; max-width: 340px; line-height: 1.65; margin-bottom: 2rem; }
    button {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.4);
      color: #fff;
      border-radius: 9999px;
      padding: 0.6rem 2rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    button:hover { background: rgba(255,255,255,0.1); border-color: #fff; }
    footer { margin-top: 3rem; font-size: 0.7rem; color: rgba(255,255,255,0.35); letter-spacing: 0.06em; text-transform: uppercase; }
  </style>
</head>
<body>
  <img src="/icons/icon-96x96.png" alt="Blue Links" onerror="this.style.display='none'" />
  <h1>You're Offline</h1>
  <p>No internet connection detected. Once you're back online, Blue Links will load normally. Pages you've already visited are still available.</p>
  <button onclick="location.reload()">Try Again</button>
  <footer>Ateneo de Davao University · Blue Links Alumni Portal</footer>
</body>
</html>
